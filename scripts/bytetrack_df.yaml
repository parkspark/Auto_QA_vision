# 던파 영상용 ByteTrack 튜닝 — 스킬 이펙트로 캐릭터가 잠깐 가려지는 상황 대응
tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.05    # 저신뢰 박스도 2단계 매칭에 활용 (이펙트 중 흐릿한 캐릭터 연결)
new_track_thresh: 0.25
track_buffer: 90          # 30→90: 가려져 사라져도 ~1.5초(60fps)까지 트랙 유지 후 재연결
match_thresh: 0.85        # 매칭 허용 폭 소폭 확대
fuse_score: true
