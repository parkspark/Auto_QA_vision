<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <title>🎮 비전 기반 게임 QA 자동화 | 캐릭터 탐지 및 추적 </title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #1e1e1e;
      color: #eee;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }

    .sub {
      color: #999;
      font-size: 13px;
      margin-bottom: 16px;
    }

    #drop {
      border: 2px dashed #555;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      color: #aaa;
      cursor: pointer;
      transition: .15s;
    }

    #drop.over {
      border-color: #4af;
      background: #26303a;
      color: #cdf;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 14px 0;
      flex-wrap: wrap;
    }

    #status {
      color: #fa0;
    }

    canvas {
      max-width: 100%;
      border-radius: 8px;
      display: block;
    }

    .legend span {
      display: inline-block;
      margin-right: 14px;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: -1px;
    }

    table {
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid #444;
      padding: 5px 10px;
    }

    th {
      background: #2c2c2c;
    }

    input[type=range] {
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <h1>던파 캐릭터 탐지 테스트 <span style="color:#4af;font-size:13px">(YOLO11s v2)</span></h1>
  <div class="sub">스크린샷을 끌어다 놓거나 클릭해서 선택하세요. 빨강=character, 청록=user_id, <b style="color:#3f3">초록=내 캐릭터(후처리 선정)</b></div>

  <div id="drop">여기에 스크린샷을 드롭 (또는 클릭해서 파일 선택)</div>
  <input type="file" id="file" accept="image/*" hidden>

  <div id="controls">
    <label>신뢰도 임계값 <input type="range" id="conf" min="0.1" max="0.9" step="0.05" value="0.5">
      <span id="confv">0.50</span></label>
    <span id="status"></span>
  </div>

  <canvas id="cv" hidden></canvas>
  <div id="result"></div>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const status = document.getElementById('status');
    const confSlider = document.getElementById('conf');
    let lastFile = null;

    confSlider.oninput = () => document.getElementById('confv').textContent = Number(confSlider.value).toFixed(2);
    confSlider.onchange = () => { if (lastFile) analyze(lastFile); };

    drop.onclick = () => fileInput.click();
    fileInput.onchange = () => { if (fileInput.files[0]) analyze(fileInput.files[0]); };
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
    drop.ondragleave = () => drop.classList.remove('over');
    drop.ondrop = e => {
      e.preventDefault(); drop.classList.remove('over');
      if (e.dataTransfer.files[0]) analyze(e.dataTransfer.files[0]);
    };

    function box(d, color, width, label) {
      ctx.strokeStyle = color; ctx.lineWidth = width;
      ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
      if (label) {
        ctx.font = 'bold 20px Malgun Gothic';
        const w = ctx.measureText(label).width + 10;
        ctx.fillStyle = color;
        ctx.fillRect(d.x1, Math.max(0, d.y1 - 26), w, 26);
        ctx.fillStyle = '#000';
        ctx.fillText(label, d.x1 + 5, Math.max(20, d.y1 - 6));
      }
    }

    async function analyze(file) {
      lastFile = file;
      status.textContent = '분석 중...';
      const img = new Image();
      img.src = URL.createObjectURL(file);
      await img.decode();
      cv.width = img.width; cv.height = img.height; cv.hidden = false;
      ctx.drawImage(img, 0, 0);

      const fd = new FormData();
      fd.append('image', file);
      fd.append('conf', confSlider.value);
      let res;
      try {
        res = await (await fetch('/predict', { method: 'POST', body: fd })).json();
      } catch (e) {
        status.textContent = '서버 오류: ' + e; return;
      }

      for (const d of res.characters) box(d, '#e44', 4, 'char ' + d.conf);
      for (const d of res.user_ids) box(d, '#3cf', 3, 'id ' + d.conf);
      if (res.my_character) {
        box(res.my_character.character, '#3f3', 6, '내 캐릭터');
        box(res.my_character.user_id, '#3f3', 4);
      }
      status.textContent = '';

      const rows = [
        ...res.characters.map((d, i) => ['character', i, d]),
        ...res.user_ids.map((d, i) => ['user_id', i, d]),
      ].map(([t, i, d]) =>
        `<tr><td>${t} #${i}</td><td>${d.conf}</td><td>(${d.x1.toFixed(0)}, ${d.y1.toFixed(0)}) ~ (${d.x2.toFixed(0)}, ${d.y2.toFixed(0)})</td></tr>`
      ).join('');
      document.getElementById('result').innerHTML =
        `<p>character <b>${res.characters.length}</b>개 / user_id <b>${res.user_ids.length}</b>개 탐지` +
        (res.my_character ? ' / 내 캐릭터 <b style="color:#3f3">선정됨</b>' : ' / 내 캐릭터 <b style="color:#fa0">미선정</b>') +
        `</p><table><tr><th>객체</th><th>신뢰도</th><th>좌표</th></tr>${rows}</table>`;
    }
  </script>
</body>

</html>
